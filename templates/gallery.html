{% extends "base.html" %}
{% block title %}Gallery{% endblock %}

{% block content %}
<div class="contractor-card">
    <h2 class="mb-4">Before & After Gallery</h2>

    <div class="gallery-grid">
        {% for job in jobs %}
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="{{ url_for('static', filename=job.before) }}" alt="Before photo">
                    <div class="photo-label">Before</div>
                </div>

                <div class="flip-card-back">
                    <img src="{{ url_for('static', filename=job.after) }}" alt="After photo">
                    <div class="photo-label">After</div>
                </div>
            </div>

            <h5 class="mt-3 text-center">{{ job.title }}</h5>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
